name: CI - Build & Deploy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile api/index.py

      - name: Check backend modules
        run: |
          cd backend
          python -c "
          import importlib, sys
          modules = ['indicators.engine', 'ai.signal_engine', 'ai.budget_optimizer']
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f'OK: {mod}')
              except Exception as e:
                  print(f'FAIL: {mod} - {e}')
                  sys.exit(1)
          "
