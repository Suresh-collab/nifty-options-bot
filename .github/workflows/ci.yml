name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run vitest + coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  backend:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Module import check
        run: |
          cd backend
          python -c "
          import importlib, sys
          modules = ['indicators.engine', 'ai.signal_engine', 'ai.budget_optimizer']
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f'OK: {mod}')
              except Exception as e:
                  print(f'FAIL: {mod} - {e}')
                  sys.exit(1)
          "

      - name: Run pytest + coverage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_MIGRATION_URL: ${{ secrets.DATABASE_MIGRATION_URL }}
          LOG_LEVEL: INFO
          ENABLE_ML_SIGNAL: "false"
          ENABLE_LIVE_BROKER: "false"
          ENABLE_AUTO_EXECUTION: "false"
        run: |
          python -m pytest tests/ \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=lcov:coverage/lcov.info \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7
